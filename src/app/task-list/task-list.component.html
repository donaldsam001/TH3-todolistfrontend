<div class="max-w-5xl mx-auto p-6 bg-white rounded-lg shadow-sm border border-gray-100 mt-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Danh sách công việc</h1>
    <button [routerLink]="['/new']" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200 shadow-sm text-sm">
      Thêm công việc mới
    </button>
  </div>

  <div class="overflow-x-auto rounded-lg border border-gray-200">
    <table class="min-w-full divide-y divide-gray-200 text-sm text-left">
      <thead class="bg-gray-50 text-gray-600 uppercase text-xs font-semibold">
        <tr>
          <th class="px-6 py-3">STT</th>
          <th class="px-6 py-3">Tên công việc</th>
          <th class="px-6 py-3">Trạng thái</th>
          <th class="px-6 py-3">Hành động</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200 bg-white">
        <tr *ngFor="let task of tasks" class="hover:bg-gray-50 transition-colors">
          <td class="px-6 py-4 font-semibold text-gray-900">{{ task.id }}</td>
          <td class="px-6 py-4">
            <a [routerLink]="['/detail', task.id]" class="text-blue-700 hover:text-blue-900 hover:underline font-medium">
              {{ task.title }}
            </a>
          </td>
          <td class="px-6 py-4">
            <span *ngIf="task.status == 0" class="px-2.5 py-1 text-xs font-semibold rounded-md bg-red-50 text-red-700 border border-red-200">Chưa làm</span>
            <span *ngIf="task.status == 1" class="px-2.5 py-1 text-xs font-semibold rounded-md bg-amber-50 text-amber-800 border border-amber-200">Đang làm</span>
            <span *ngIf="task.status == 2" class="px-2.5 py-1 text-xs font-semibold rounded-md bg-green-50 text-green-700 border border-green-200">Hoàn thành</span>
          </td>
          <td class="px-6 py-4 flex gap-2">
            <button *ngIf="task.status === 0" (click)="onExecute(task)" 
                    class="font-medium text-xs py-1.5 px-3 rounded-md bg-blue-50 text-blue-700 border border-blue-200 hover:bg-blue-100 transition-colors">
              Thực hiện
            </button>
            
            <button *ngIf="task.status === 1" (click)="onComplete(task)" 
                    class="font-medium text-xs py-1.5 px-3 rounded-md bg-green-50 text-green-700 border border-green-200 hover:bg-green-100 transition-colors">
              Kết thúc
            </button>
            
            <button (click)="onDelete(task)" 
                    class="font-medium text-xs py-1.5 px-3 rounded-md bg-gray-50 text-gray-700 border border-gray-200 hover:bg-red-50 hover:text-red-700 hover:border-red-200 transition-colors">
              Xóa
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
